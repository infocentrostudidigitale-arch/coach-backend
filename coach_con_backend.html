<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LearnAI Coach</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'DM Sans', sans-serif;
    background: #07091a; color: #e8eaf0;
    min-height: 100vh; display: flex;
    flex-direction: column; align-items: center; justify-content: center; padding: 20px;
  }
  .app {
    width: 100%; max-width: 960px; background: #0e1225;
    border-radius: 24px; border: 0.5px solid rgba(255,255,255,0.08);
    overflow: hidden; display: flex; flex-direction: column;
    min-height: 600px; box-shadow: 0 40px 80px rgba(0,0,0,0.6);
  }
  .header {
    display: flex; align-items: center; gap: 14px; padding: 16px 24px;
    background: rgba(255,255,255,0.03); border-bottom: 0.5px solid rgba(255,255,255,0.07);
  }
  .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #6c63ff, #a78bfa);
    border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px;
  }
  .header-text .title { font-family: 'Syne', sans-serif; font-size: 16px; font-weight: 700; color: #fff; }
  .header-text .subtitle { font-size: 11px; color: rgba(255,255,255,0.35); margin-top: 1px; }
  .status { margin-left: auto; display: flex; align-items: center; gap: 7px; font-size: 11px; color: rgba(255,255,255,0.4); }
  .status-dot { width: 7px; height: 7px; border-radius: 50%; background: #4ade80; box-shadow: 0 0 6px #4ade80; animation: blink-dot 2.5s ease-in-out infinite; }
  @keyframes blink-dot { 0%,100%{opacity:1} 50%{opacity:0.3} }

  .body { flex: 1; display: grid; grid-template-columns: 1fr 320px; }
  @media (max-width: 680px) { .body { grid-template-columns: 1fr; } }

  .coach-panel { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 32px 24px 24px; }

  .avatar-ring {
    width: 200px; height: 200px; border-radius: 50%;
    position: relative; display: flex; align-items: center; justify-content: center; margin-bottom: 20px;
  }
  .avatar-glow {
    position: absolute; inset: -5px; border-radius: 50%;
    background: conic-gradient(from 0deg, #6c63ff, #a78bfa, #c084fc, #6c63ff);
    opacity: 0; transition: opacity 0.4s; animation: spin-glow 3s linear infinite; z-index: 0;
  }
  .avatar-ring.speaking .avatar-glow { opacity: 1; }
  @keyframes spin-glow { to { transform: rotate(360deg); } }

  #heygen-video {
    position: relative; z-index: 1; width: 190px; height: 190px;
    border-radius: 50%; object-fit: cover;
    border: 2px solid rgba(108,99,255,0.35); background: #1a1535; display: none;
  }
  .avatar-placeholder {
    position: absolute; z-index: 1; width: 190px; height: 190px; border-radius: 50%;
    background: radial-gradient(circle at 35% 35%, #2a235a, #0e1030);
    border: 2px solid rgba(108,99,255,0.35);
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 10px;
  }
  .eyes { display: flex; gap: 18px; }
  .eye { width: 12px; height: 12px; border-radius: 50%; background: #a78bfa; box-shadow: 0 0 8px rgba(167,139,250,0.8); }
  .avatar-ring.speaking .eye { animation: eye-blink 3.5s ease-in-out infinite; }
  @keyframes eye-blink { 0%,88%,100%{transform:scaleY(1)} 94%{transform:scaleY(0.1)} }
  .mouth { width: 28px; height: 5px; border-radius: 3px; background: rgba(167,139,250,0.3); transition: all 0.15s; }
  .avatar-ring.speaking .mouth { animation: mouth-talk 0.25s ease-in-out infinite alternate; }
  @keyframes mouth-talk { from{height:5px;width:26px} to{height:13px;width:36px;border-radius:20px;background:rgba(167,139,250,0.55)} }
  .avatar-lbl { font-family:'Syne',sans-serif; font-size:10px; font-weight:700; letter-spacing:3px; color:rgba(167,139,250,0.5); }

  .coach-name { font-family:'Syne',sans-serif; font-size:20px; font-weight:700; color:#fff; margin-bottom:3px; }
  .coach-role { font-size:11px; letter-spacing:1.5px; text-transform:uppercase; color:rgba(167,139,250,0.6); margin-bottom:22px; }

  .speech-bubble {
    background: rgba(108,99,255,0.1); border: 0.5px solid rgba(108,99,255,0.2);
    border-radius: 18px; padding: 14px 18px; font-size: 13px; line-height: 1.6;
    color: rgba(255,255,255,0.75); text-align: center; min-height: 64px; max-width: 300px;
    display: flex; align-items: center; justify-content: center; word-break: break-word;
  }
  .sound-bars { display:flex; align-items:flex-end; gap:4px; height:26px; margin-top:16px; opacity:0; transition:opacity 0.3s; }
  .sound-bars.active { opacity:1; }
  .bar { width:4px; background:linear-gradient(to top,#6c63ff,#a78bfa); border-radius:2px; transform-origin:bottom; }
  .sound-bars.active .bar { animation:bar-wave 0.5s ease-in-out infinite alternate; }
  .bar:nth-child(1){height:35%;animation-delay:0s}.bar:nth-child(2){height:65%;animation-delay:.07s}
  .bar:nth-child(3){height:100%;animation-delay:.14s}.bar:nth-child(4){height:75%;animation-delay:.21s}
  .bar:nth-child(5){height:55%;animation-delay:.14s}.bar:nth-child(6){height:85%;animation-delay:.07s}
  .bar:nth-child(7){height:40%;animation-delay:0s}
  @keyframes bar-wave { from{transform:scaleY(0.25)} to{transform:scaleY(1)} }

  .chat-section { background:rgba(255,255,255,0.02); border-left:0.5px solid rgba(255,255,255,0.06); display:flex; flex-direction:column; }
  .chat-header { padding:12px 16px; border-bottom:0.5px solid rgba(255,255,255,0.06); font-family:'Syne',sans-serif; font-size:10px; font-weight:600; letter-spacing:1.8px; text-transform:uppercase; color:rgba(255,255,255,0.25); }
  .topic-chips { display:flex; flex-wrap:wrap; gap:6px; padding:10px 12px; border-bottom:0.5px solid rgba(255,255,255,0.06); }
  .chip { padding:4px 11px; border-radius:20px; font-size:11px; background:rgba(108,99,255,0.1); border:0.5px solid rgba(108,99,255,0.22); color:rgba(167,139,250,0.85); cursor:pointer; transition:all 0.2s; }
  .chip:hover { background:rgba(108,99,255,0.22); }
  .messages { flex:1; overflow-y:auto; padding:14px 12px; display:flex; flex-direction:column; gap:10px; max-height:340px; }
  .messages::-webkit-scrollbar { width:3px; }
  .messages::-webkit-scrollbar-thumb { background:rgba(255,255,255,0.08); border-radius:2px; }
  .msg { display:flex; flex-direction:column; max-width:86%; gap:3px; }
  .msg.user { align-self:flex-end; align-items:flex-end; }
  .msg-text { padding:9px 13px; border-radius:14px; font-size:12.5px; line-height:1.55; word-break:break-word; }
  .msg.user .msg-text { background:#5b52e8; color:#fff; border-radius:14px 14px 3px 14px; }
  .msg.coach .msg-text { background:rgba(255,255,255,0.06); color:rgba(255,255,255,0.82); border:0.5px solid rgba(255,255,255,0.09); border-radius:14px 14px 14px 3px; }
  .msg-time { font-size:10px; color:rgba(255,255,255,0.2); padding:0 3px; }
  .typing { display:flex; gap:5px; align-items:center; padding:10px 14px; background:rgba(255,255,255,0.06); border:0.5px solid rgba(255,255,255,0.09); border-radius:14px 14px 14px 3px; width:fit-content; }
  .t-dot { width:5px; height:5px; border-radius:50%; background:rgba(255,255,255,0.35); animation:t-bounce 1.1s ease-in-out infinite; }
  .t-dot:nth-child(2){animation-delay:.18s}.t-dot:nth-child(3){animation-delay:.36s}
  @keyframes t-bounce { 0%,80%,100%{transform:scale(0.7);opacity:0.3} 40%{transform:scale(1.1);opacity:1} }

  .controls { padding:18px 24px; background:rgba(255,255,255,0.025); border-top:0.5px solid rgba(255,255,255,0.07); display:flex; align-items:center; justify-content:center; gap:20px; }
  .mic-btn { width:68px; height:68px; border-radius:50%; border:1.5px solid rgba(108,99,255,0.4); background:rgba(108,99,255,0.15); color:#fff; font-size:28px; cursor:pointer; display:flex; align-items:center; justify-content:center; transition:all 0.2s; outline:none; }
  .mic-btn:hover { background:rgba(108,99,255,0.28); transform:scale(1.05); }
  .mic-btn.recording { background:rgba(220,38,38,0.18); border-color:rgba(220,38,38,0.55); animation:pulse-rec 1s ease-in-out infinite; }
  @keyframes pulse-rec { 0%,100%{box-shadow:0 0 0 0 rgba(220,38,38,0.3)} 50%{box-shadow:0 0 0 14px rgba(220,38,38,0)} }
  .mic-label { font-size:11px; color:rgba(255,255,255,0.35); text-align:center; min-width:90px; }
  .icon-btn { width:44px; height:44px; border-radius:50%; border:0.5px solid rgba(255,255,255,0.1); background:transparent; cursor:pointer; display:flex; align-items:center; justify-content:center; font-size:16px; color:rgba(255,255,255,0.45); transition:all 0.2s; outline:none; }
  .icon-btn:hover { background:rgba(255,255,255,0.07); color:rgba(255,255,255,0.8); }

  .banner { background:rgba(239,156,39,0.12); border:0.5px solid rgba(239,156,39,0.3); border-radius:10px; padding:10px 14px; font-size:12px; color:rgba(239,156,39,0.9); margin:10px 20px; line-height:1.5; display:none; }
  .banner.show { display:block; }
  .toast { position:fixed; bottom:24px; left:50%; transform:translateX(-50%) translateY(20px); background:#dc2626; color:#fff; padding:10px 20px; border-radius:24px; font-size:13px; opacity:0; transition:all 0.3s; pointer-events:none; z-index:999; white-space:nowrap; }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!--
  ⚙️  UNICA COSA DA CAMBIARE:
  Metti l'URL del tuo backend Render qui sotto.
  Esempio: 'https://coach-backend-xyz.onrender.com'
  Finché sei in locale usa: 'http://localhost:3000'
-->
<script>
  const BACKEND_URL = 'https://coach-backend-xyz.onrender.com';
</script>

<div class="app">
  <div class="header">
    <div class="logo">🎓</div>
    <div class="header-text">
      <div class="title">LearnAI Coach</div>
      <div class="subtitle">Piattaforma di apprendimento vocale</div>
    </div>
    <div class="status">
      <div class="status-dot"></div>
      <span id="status-text">Connessione...</span>
    </div>
  </div>

  <div class="banner" id="banner"></div>

  <div class="body">
    <div class="coach-panel">
      <div class="avatar-ring" id="avatar-ring">
        <div class="avatar-glow"></div>
        <video id="heygen-video" autoplay playsinline></video>
        <div class="avatar-placeholder" id="placeholder">
          <div class="eyes"><div class="eye"></div><div class="eye"></div></div>
          <div class="mouth"></div>
          <div class="avatar-lbl">AI COACH</div>
        </div>
      </div>
      <div class="coach-name">Coach Sofia</div>
      <div class="coach-role">Virtual Learning Assistant</div>
      <div class="speech-bubble" id="bubble">Ciao! Premi il microfono 🎤 e dimmi su cosa vuoi imparare!</div>
      <div class="sound-bars" id="sound-bars">
        <div class="bar"></div><div class="bar"></div><div class="bar"></div>
        <div class="bar"></div><div class="bar"></div><div class="bar"></div><div class="bar"></div>
      </div>
    </div>

    <div class="chat-section">
      <div class="chat-header">Conversazione</div>
      <div class="topic-chips">
        <div class="chip" onclick="quickAsk('matematica')">📐 Matematica</div>
        <div class="chip" onclick="quickAsk('inglese')">🇬🇧 Inglese</div>
        <div class="chip" onclick="quickAsk('coding')">💻 Coding</div>
        <div class="chip" onclick="quickAsk('scienze')">🔬 Scienze</div>
        <div class="chip" onclick="quickAsk('storia')">📜 Storia</div>
        <div class="chip" onclick="quickAsk('studio')">🧠 Studio</div>
      </div>
      <div class="messages" id="messages"></div>
    </div>
  </div>

  <div class="controls">
    <button class="icon-btn" onclick="clearChat()">🗑️</button>
    <div style="display:flex;flex-direction:column;align-items:center;gap:8px">
      <button class="mic-btn" id="mic-btn" onclick="toggleMic()">🎤</button>
      <div class="mic-label" id="mic-label">Clicca per parlare</div>
    </div>
    <button class="icon-btn" id="mute-btn" onclick="toggleMute()">🔊</button>
  </div>
</div>
<div class="toast" id="toast"></div>

<script src="https://unpkg.com/@heygen/streaming-avatar@latest/dist/index.umd.js"></script>
<script>
let history     = [];
let isRecording = false;
let isMuted     = false;
let recognition = null;
let typingEl    = null;
let avatar      = null;
let heygenReady = false;

// ── UI helpers ────────────────────────────────────────
const ring   = document.getElementById('avatar-ring');
const bars   = document.getElementById('sound-bars');
const bubble = document.getElementById('bubble');

function setSpeaking(val) {
  ring.classList.toggle('speaking', val);
  if (!isRecording) bars.classList.toggle('active', val);
}
function setRecording(val) {
  isRecording = val;
  document.getElementById('mic-btn').classList.toggle('recording', val);
  document.getElementById('mic-label').textContent = val ? '🔴 In ascolto...' : 'Clicca per parlare';
  bars.classList.toggle('active', val);
}
function setBubble(t) { bubble.textContent = t; }
function setStatus(t) { document.getElementById('status-text').textContent = t; }
function showBanner(t) { const b=document.getElementById('banner'); b.textContent=t; b.classList.add('show'); }
function showToast(t) {
  const el=document.getElementById('toast'); el.textContent=t; el.classList.add('show');
  setTimeout(()=>el.classList.remove('show'), 4500);
}

// ── HeyGen init ───────────────────────────────────────
async function initHeygen() {
  try {
    setStatus('Connessione avatar...');

    // 1. Prendi token dal nostro backend (sicuro, nessuna key esposta)
    const tokenRes = await fetch(BACKEND_URL + '/api/token', { method: 'POST' });
    const { token, error } = await tokenRes.json();
    if (!token) throw new Error(error || 'Token non ricevuto');

    // 2. Prendi avatar ID dal backend
    const avatarRes = await fetch(BACKEND_URL + '/api/avatar-id');
    const { avatarId } = await avatarRes.json();

    // 3. Inizializza SDK HeyGen
    avatar = new HeyGen.StreamingAvatar({ token });

    const session = await avatar.createStartAvatar({
      quality:    HeyGen.AvatarQuality.Medium,
      avatarName: avatarId,
      voice:      { rate: 1.0, emotion: HeyGen.VoiceEmotion.FRIENDLY },
      language:   'it',
    });

    // 4. Mostra video dell'avatar reale
    const videoEl = document.getElementById('heygen-video');
    if (session?.stream) {
      videoEl.srcObject = session.stream;
      videoEl.style.display = 'block';
      document.getElementById('placeholder').style.display = 'none';
    }

    // 5. Eventi
    avatar.on(HeyGen.StreamingEvents.AVATAR_START_TALKING, () => setSpeaking(true));
    avatar.on(HeyGen.StreamingEvents.AVATAR_STOP_TALKING,  () => setSpeaking(false));
    avatar.on(HeyGen.StreamingEvents.STREAM_DISCONNECTED,  () => { heygenReady=false; setStatus('Disconnesso'); });

    heygenReady = true;
    setStatus('Online');
    setBubble('Ciao! Sono Sofia 👋 Clicca il microfono e dimmi cosa vuoi imparare!');

  } catch (err) {
    console.error('HeyGen error:', err);
    showBanner('⚠️ Avatar HeyGen non disponibile: ' + err.message + '. Il coach usa l\'avatar animato con voce del browser.');
    setStatus('Modalità browser');
  }
}

// ── Parla: HeyGen oppure browser ─────────────────────
async function heygenSpeak(text) {
  if (!heygenReady || !avatar) return false;
  try {
    await avatar.speak({ text, taskType: HeyGen.TaskType.REPEAT });
    return true;
  } catch(e) { console.warn('speak error', e); return false; }
}

function getBestItalianVoice() {
  const voices = speechSynthesis.getVoices();
  const priority = ['Alice','Federica','Luca','Paola','Elsa','Google italiano','Google Italian'];
  for (const name of priority) {
    const v = voices.find(v => v.name.toLowerCase().includes(name.toLowerCase()));
    if (v) return v;
  }
  return voices.find(v => v.lang?.startsWith('it')) || null;
}

function speakBrowser(text) {
  speechSynthesis.cancel();
  const u = new SpeechSynthesisUtterance(text.replace(/[^\w\s.,!?àèéìòù''""()\-:;]/g,' '));
  u.lang='it-IT'; u.rate=1.0; u.pitch=1.1;
  const go = () => {
    const v = getBestItalianVoice();
    if (v) u.voice = v;
    u.onstart = () => setSpeaking(true);
    u.onend = u.onerror = () => setSpeaking(false);
    speechSynthesis.speak(u);
  };
  speechSynthesis.getVoices().length ? go() : (speechSynthesis.onvoiceschanged = go);
}

async function speak(text) {
  if (isMuted) return;
  const ok = await heygenSpeak(text);
  if (!ok) speakBrowser(text);
}

function toggleMute() {
  isMuted = !isMuted;
  document.getElementById('mute-btn').textContent = isMuted ? '🔇' : '🔊';
  if (isMuted) { speechSynthesis.cancel(); setSpeaking(false); }
}

// ── Claude via backend ────────────────────────────────
async function sendMessage(text) {
  if (!text.trim()) return;
  addMsg('user', text);
  showTyping();
  history.push({ role: 'user', content: text });
  if (history.length > 24) history = history.slice(-24);

  try {
    const res = await fetch(BACKEND_URL + '/api/chat', {
      method:  'POST',
      headers: { 'Content-Type': 'application/json' },
      body:    JSON.stringify({ messages: history })
    });
    const { reply, error } = await res.json();
    hideTyping();
    if (!reply) throw new Error(error || 'Risposta vuota');
    history.push({ role: 'assistant', content: reply });
    addMsg('coach', reply);
    setBubble(reply.length > 110 ? reply.slice(0,108)+'…' : reply);
    speak(reply);
  } catch(err) {
    hideTyping();
    showToast('Errore: ' + err.message);
  }
}

// ── Speech Recognition ────────────────────────────────
function initRecognition() {
  const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
  if (!SR) { showToast('Usa Chrome o Edge per il microfono'); return; }
  recognition = new SR();
  recognition.lang = 'it-IT';
  recognition.continuous = false;
  recognition.interimResults = true;
  recognition.onstart  = () => { setRecording(true); setBubble('🎙 Ti sto ascoltando...'); };
  recognition.onresult = (e) => {
    const t = Array.from(e.results).map(r=>r[0].transcript).join('');
    setBubble('🎙 ' + t);
    if (e.results[e.results.length-1].isFinal && t.trim()) sendMessage(t.trim());
  };
  recognition.onerror = (e) => {
    setRecording(false);
    if (e.error==='not-allowed') showToast('❌ Consenti accesso al microfono');
    else if (e.error!=='no-speech') showToast('Errore microfono: '+e.error);
    setBubble('Premi il microfono e parla...');
  };
  recognition.onend = () => setRecording(false);
}

function toggleMic() {
  if (!recognition) { initRecognition(); if (!recognition) return; }
  if (isRecording) { recognition.stop(); }
  else {
    speechSynthesis.cancel(); setSpeaking(false);
    try { recognition.start(); } catch(e) { setTimeout(()=>{ try{recognition.start();}catch(e2){} },400); }
  }
}

// ── Chat UI ───────────────────────────────────────────
function addMsg(role, text) {
  const w = document.createElement('div'); w.className='msg '+role;
  const b = document.createElement('div'); b.className='msg-text'; b.textContent=text;
  const t = document.createElement('div'); t.className='msg-time';
  t.textContent = new Date().toLocaleTimeString('it-IT',{hour:'2-digit',minute:'2-digit'});
  w.appendChild(b); w.appendChild(t);
  const m = document.getElementById('messages');
  m.appendChild(w); m.scrollTop=9999;
}
function showTyping() {
  typingEl = document.createElement('div'); typingEl.className='msg coach';
  typingEl.innerHTML='<div class="typing"><div class="t-dot"></div><div class="t-dot"></div><div class="t-dot"></div></div>';
  const m=document.getElementById('messages'); m.appendChild(typingEl); m.scrollTop=9999;
}
function hideTyping() { if(typingEl){typingEl.remove();typingEl=null;} }
function clearChat() {
  history=[]; document.getElementById('messages').innerHTML='';
  addMsg('coach','Nuova sessione! Su cosa vuoi lavorare? 🎯');
  setBubble('Premi il microfono e parla...');
}
function quickAsk(topic) {
  const p={matematica:'Spiegami un concetto di matematica con un esempio pratico.',inglese:'Aiutami con un esercizio di inglese utile.',coding:'Spiegami le basi della programmazione in modo semplice.',scienze:'Raccontami un concetto scientifico interessante.',storia:'Qual è un evento storico importante che dovrei conoscere?',studio:'Dammi consigli pratici per studiare meglio.'};
  sendMessage(p[topic]||'Parlami di '+topic);
}

// ── Avvio ─────────────────────────────────────────────
initRecognition();
initHeygen();
addMsg('coach','Ciao! Sono Sofia 👋 Clicca il microfono e dimmi cosa vuoi imparare oggi!');
</script>
</body>
</html>
